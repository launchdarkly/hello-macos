name: Build
on:
  push:
    branches: [main, 'feat/**']
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, 'feat/**']
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: macos-15

    steps:
      # https://github.com/actions/checkout/releases/tag/v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # https://github.com/maxim-lobanov/setup-xcode/releases/tag/v1.6.0
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: 16.4

      - name: Build hello-macos
        run: xcodebuild build -scheme 'hello-macos' -workspace 'hello-macos.xcworkspace' | xcpretty
